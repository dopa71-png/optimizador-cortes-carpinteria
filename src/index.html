<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪚 OptiCorte - Optimizador de Cortes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🪚 OptiCorte</h1>
      <p>Optimizador de Cortes para Carpintería</p>
    </header>

    <section class="config">
      <h2>⚙️ Configuración</h2>
      <div class="form-group">
        <label>Kerf (mm):</label>
        <input type="number" id="kerf" value="3.2" step="0.1">
      </div>
      <div class="form-group">
        <label>Unidad:</label>
        <select id="unidad">
          <option value="mm">Milímetros</option>
          <option value="cm">Centímetros</option>
        </select>
      </div>
    </section>

    <section class="tableros">
      <h2>📦 Tableros Disponibles</h2>
      <div id="tableros-lista"></div>
      <button onclick="agregarTablero()">+ Agregar Tablero</button>
    </section>

    <section class="piezas">
      <h2>✂️ Piezas a Cortar</h2>
      <div id="piezas-lista"></div>
      <button onclick="agregarPieza()">+ Agregar Pieza</button>
    </section>

    <button class="btn-optimizar" onclick="optimizar()">
      🚀 OPTIMIZAR CORTES
    </button>

    <section class="resultados" id="resultados">
      <h2>📊 Resultados</h2>
      <div id="diagrama"></div>
      <div id="resumen"></div>
    </section>
  </div>

  <script src="lib/optimizer.js"></script>
  <script src="app.js"></script>
</body>
</html>
